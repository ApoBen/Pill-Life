<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Pill-Life — İlaç farmakokinetik takip uygulaması. İlaçlarınızın kan seviyelerini gerçek zamanlı izleyin.">
  <meta name="theme-color" content="#06060f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.png">
  <title>Pill-Life — İlaç Takip</title>

  <!-- Chart.js (Local) -->
  <script src="libs/chart.umd.min.js"></script>
  <!-- Chart.js Annotation Plugin (Local) -->
  <script src="libs/chartjs-plugin-annotation.min.js"></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>



  <!-- ═══ Header ═══ -->
  <header class="app-header">
    <div class="container">
      <div class="header-inner">
        <div class="app-logo">
          <div class="logo-icon">💊</div>
          <div>
            <span class="logo-text">Pill-Life</span>
            <span class="logo-sub">Farmakokinetik Takip</span>
          </div>
        </div>
        <div class="header-actions" style="display: flex; gap: 8px;">
          <button class="btn btn-secondary" id="btn-widget-settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            Widget Ayarları
          </button>
          <button class="btn btn-primary" id="btn-add-drug">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Yeni İlaç Ekle
          </button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- ═══ Drug Cards ═══ -->
    <section class="section container">
      <div class="section-header">
        <h2 class="section-title">İlaçlarım</h2>
      </div>
      <div class="drug-cards-grid" id="drug-cards-grid">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- ═══ Chart ═══ -->
    <section class="section container">
      <div class="section-header">
        <h2 class="section-title">Kan Seviyesi Grafiği</h2>
        <div class="chart-controls">
          <label for="hours-range">Görüntüleme:</label>
          <select id="hours-range">
            <option value="12">12 Saat</option>
            <option value="24" selected>24 Saat</option>
            <option value="48">48 Saat</option>
            <option value="72">72 Saat</option>
          </select>
        </div>
      </div>
      <div class="chart-container">
        <div class="chart-wrapper">
          <canvas id="pharma-chart"></canvas>
        </div>
        <div class="chart-resize-handle" id="chart-resize-handle" title="Sürükleyerek boyutlandır">
          <span class="resize-dots">⋯</span>
        </div>
      </div>
    </section>

    <!-- ═══ Dose History ═══ -->
    <section class="section container history-section">
      <div class="section-header">
        <h2 class="section-title">Doz Geçmişi ve Raporlama</h2>
        <div class="history-controls" style="display: flex; gap: 8px; flex-wrap: wrap;">
          <button class="btn btn-secondary active" id="btn-filter-all" style="padding: 8px 14px; font-size: 0.8rem;">Tüm Geçmiş</button>
          <button class="btn btn-secondary" id="btn-filter-24h" style="padding: 8px 14px; font-size: 0.8rem;">Son 24 Saat</button>
          <button class="btn btn-secondary" id="btn-filter-custom" style="padding: 8px 14px; font-size: 0.8rem;">Tarih Aralığı</button>

        </div>
      </div>
      
      <!-- Collapsible Date Range Panel -->
      <div class="filter-panel" id="date-filter-panel" style="display: none; margin-bottom: 20px; gap: 16px; align-items: center; background: var(--bg-card); padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--glass-border); flex-wrap: wrap;">
        <div style="display: flex; gap: 12px; align-items: center; flex: 1; min-width: 250px;">
          <div class="form-group" style="margin: 0; flex: 1;">
            <label class="form-label" style="font-size: 0.75rem; margin-bottom: 4px; display: block; color: var(--text-secondary);">Başlangıç Tarihi</label>
            <input type="date" class="form-input" id="filter-start-date" style="padding: 8px 12px; font-size: 0.8rem; background: var(--bg-input); border: 1px solid var(--glass-border); color: #fff; border-radius: var(--radius-sm); width: 100%;">
          </div>
          <div class="form-group" style="margin: 0; flex: 1;">
            <label class="form-label" style="font-size: 0.75rem; margin-bottom: 4px; display: block; color: var(--text-secondary);">Bitiş Tarihi</label>
            <input type="date" class="form-input" id="filter-end-date" style="padding: 8px 12px; font-size: 0.8rem; background: var(--bg-input); border: 1px solid var(--glass-border); color: #fff; border-radius: var(--radius-sm); width: 100%;">
          </div>
        </div>
        <button class="btn btn-primary" id="btn-apply-date-filter" style="padding: 8px 16px; font-size: 0.8rem; margin-top: 18px;">Uygula</button>
      </div>

      <div id="dose-history-list">
        <!-- Rendered by JS -->
      </div>
    </section>
  </main>

  <!-- ═══ Footer ═══ -->
  <footer class="app-footer container">
    <p>Pill-Life © 2026 — Kişisel farmakokinetik takip aracı. Tıbbi tavsiye yerine geçmez.</p>
  </footer>

  <!-- ═══ Modal ═══ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">Modal</h3>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Rendered by JS -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel-btn" type="button">İptal</button>
        <button class="btn btn-primary" id="modal-submit-btn" type="button">Kaydet</button>
      </div>
    </div>
  </div>

  <!-- ═══ Toast Container ═══ -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- ═══ App Scripts ═══ -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
